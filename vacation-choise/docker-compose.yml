services:
  mysql:
    image: mysql:8.0
    container_name: vacation-choice-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: vacation_choise
      MYSQL_USER: vacation_user
      MYSQL_PASSWORD: vacation_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot_pass"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mysql_data:
